<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 268 52" role="img" aria-label="Forge &amp; Flux Consulting">
  <title>Forge &amp; Flux Consulting</title>

  <!--
    ═══════════════════════════════════════════
    FORGE & FLUX CONSULTING — Primary Logo
    Mark: Split diamond (Navy / Flux Blue)
    Wordmark: FORGE & FLUX + CONSULTING
    ═══════════════════════════════════════════
  -->

  <!-- ── ICON MARK (48×48 diamond centered in 52×52 space) ── -->

  <!-- Upper half: Forge Navy — solid, structural, foundational -->
  <polygon points="26,3 50,27 2,27" fill="#041E42"/>

  <!-- Lower half: Flux Blue — dynamic, transformative, forward -->
  <polygon points="2,27 50,27 26,51" fill="#0072CE"/>

  <!-- Thin white divider — the tension between forge and flux -->
  <line x1="2" y1="27" x2="50" y2="27" stroke="#FFFFFF" stroke-width="1.5" opacity="0.55"/>

  <!-- Orange accent: small square inset at top-right of diamond — the spark -->
  <rect x="37" y="10" width="7" height="7" fill="#E65100" transform="rotate(45 40.5 13.5)"/>

  <!-- ── VERTICAL DIVIDER ── -->
  <line x1="64" y1="10" x2="64" y2="42" stroke="#041E42" stroke-width="1" opacity="0.18"/>

  <!-- ── WORDMARK ── -->

  <!-- Primary: FORGE & FLUX — Oswald bold (falls back to Arial Narrow / Impact) -->
  <text
    x="76" y="31"
    font-family="Oswald, 'Arial Narrow', Impact, sans-serif"
    font-weight="700"
    font-size="22"
    fill="#041E42"
    letter-spacing="1.2"
  >FORGE &amp; FLUX</text>

  <!-- Secondary: CONSULTING — IBM Plex Sans (falls back to Helvetica / Arial) -->
  <text
    x="77" y="44"
    font-family="'IBM Plex Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="400"
    font-size="9"
    fill="#0072CE"
    letter-spacing="4"
  >CONSULTING</text>

</svg>
